# =============================================================================
# Build + publish rtpengine multi-arch (amd64 + arm64) to GHCR
# =============================================================================
# Replaces upstream drachtio/docker-rtpengine's single-arch workflow.
#
# Triggers:
#   - push to main / master branches      → publishes :main / :latest
#   - push of a v* tag                    → publishes :<version>
#   - workflow_dispatch                   → manual rebuild
#   - bumped by sipwise-version-tracker.yml when upstream cuts a release
#
# Multi-arch: amd64 native on the GH-hosted runner, arm64 cross-built via
# QEMU. Adds ~30-60% to total job time but avoids paying for a second
# arm64 runner. If build time becomes a problem, switch to a native arm
# runner (`runs-on: ubuntu-24.04-arm`) and drop the QEMU step.
# =============================================================================
name: Docker build + publish (multi-arch)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      rtpengine_version:
        description: "Override RTPENGINE_VERSION build-arg (defaults to Dockerfile pin)"
        required: false
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arxyninc/rtpengine

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # arm64 cross-build is slow under QEMU
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner emit linux/arm64 image layers.
      # Drop this step (and the arm64 platform below) for ~50% faster
      # builds if/when a native arm64 runner is provisioned.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          # Multi-arch publish. QEMU adds 30-60% wall-clock; switch to
          # a native arm64 runner + drop QEMU step to cut that back.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rtpengine-multiarch-v2
          cache-to: type=gha,scope=rtpengine-multiarch-v2,mode=max
          build-args: |
            ${{ github.event.inputs.rtpengine_version && format('RTPENGINE_VERSION={0}', github.event.inputs.rtpengine_version) || '' }}
          # OCI provenance + SBOM (cosign tree / gh attestation can inspect)
          provenance: mode=max
          sbom: true

      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## rtpengine multi-arch build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
